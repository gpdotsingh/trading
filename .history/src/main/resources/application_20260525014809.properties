# Server
server.port=8080
spring.application.name=saxo-cfd-api

# Trading — only TrendSpider signals may place orders (set true to allow manual API calls)
trading.manual-orders-enabled=false
# Broker routing: saxo | capital | both
trading.broker=saxo

# ── Risk Management ───────────────────────────────────────────────────────────
# Set enabled=false to disable automatic stop loss on all orders
trading.risk.enabled=true
# Stop loss distance as % of entry price  (e.g. 2.0 = 2%)
trading.risk.stop-loss-pct=2.0
# Take profit distance as % of entry price (e.g. 4.0 = 4%)
trading.risk.take-profit-pct=4.0
# Set true to let Python analytics signals place real orders (uses trading.broker above)
analytics.auto-trade-enabled=true

# Logging
logging.level.com.trading=DEBUG
logging.level.org.springframework.web.servlet.resource=OFF

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ── TrendSpider Webhook ───────────────────────────────────────────────────────
