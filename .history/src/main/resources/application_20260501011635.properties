preset.indices.symbols=Germany 40,Netherlands 25
preset.indices.assetType=CfdOnIndex

preset.metals.label=Metals
preset.metals.symbols=XAUUSD,XAGUSD
preset.metals.assetType=FxSpot

preset.energy.label=Energy
preset.energy.symbols=Crude Oil WTI,Brent Crude
preset.energy.assetType=CfdOnFutures

preset.stocks.label=US Stocks
preset.stocks.symbols=AAPL,TSLA,MSFT,NVDA,AMZN
preset.stocks.assetType=CfdOnStock

