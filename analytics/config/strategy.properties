# ── Spring Boot connection ───────────────────────────────────────────────────────
# HTTP base used for /api/instruments/details/bulk on startup
spring.base_url=http://localhost:8080
analytics.reporter.enabled=true

# ── Spring Boot WebSocket (SockJS + STOMP) connection ──────────────────────────
websocket.base_url=ws://localhost:8080/ws
websocket.topic=/topic/prices

# ── Instruments to watch (must match what Spring Boot streams) ───────────────────
# Comma-separated keywords — used to fetch MinimumTradeSize from Saxo API on startup
watched.symbols=Germany 40,Netherlands 25
watched.assetType=CfdOnIndex
websocket.reconnect_delay_seconds=5
websocket.max_reconnect_attempts=10

# ── Lévy α-Stable model parameters ─────────────────────────────────────────────
# stability index seed (0 < alpha <= 2); 2.0 = Gaussian, 1.5 = typical equity tail
strategy.levy_alpha_init=1.5
# skewness seed (-1 to +1); 0 = symmetric
strategy.levy_beta=0.0
# fraction of extreme observations used by Hill tail estimator
strategy.levy_tail_fraction=0.10

# ── Dynamic momentum parameters ─────────────────────────────────────────────────
# rolling window for return / momentum history
strategy.window_size=50
# adaptive EWMA decay bounds: lambda moves between [decay_min, decay_max]
strategy.momentum_decay_min=0.80
strategy.momentum_decay_max=0.98
# lookback bars for realized-volatility estimate
strategy.volatility_lookback=20

# ── Trade sizing ─────────────────────────────────────────────────────────────────
# Default quantity when no per-symbol override is set
strategy.quantity_per_trade=1

# Per-symbol overrides: symbol:quantity pairs (comma-separated)
# Indices (Germany 40, Netherlands 25) : 1 contract
# Energy  (Crude Oil WTI, Brent Crude) : 10 barrels
# Metals  (Gold, Silver)               : 0.01 oz
# US Stocks                            : 1 share
strategy.min_sizes=Germany 40:1,Netherlands 25:1,Crude Oil WTI:10,Brent Crude:10,Gold:0.01,Silver:0.01

# ── Signal thresholds ────────────────────────────────────────────────────────────
# momentum > threshold_buy  → BUY
strategy.signal_threshold_buy=0.0015
# momentum < threshold_sell → SELL  (must be negative)
strategy.signal_threshold_sell=-0.0015
# minimum ticks before any signal is emitted
strategy.min_data_points=10

# ── Logging ─────────────────────────────────────────────────────────────────────
logging.level=INFO
logging.file=logs/levy_strategy.log
logging.format=%%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s
